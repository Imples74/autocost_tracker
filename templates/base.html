<!DOCTYPE html>
<html lang="ru">
<head>

  <style>

    body{

    background:#f5f5f5;

    }

    .card{

    border:none;

    border-radius:12px;

    }

  </style>  
  
  <meta charset="UTF-8"></meta>

  <meta name="viewport"
        content="width=device-width, initial-scale=1"></meta>

      <title>
        {% block title %}
        AutoCost Tracker
        {% endblock %}
      </title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"></link>
</head>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    
    <a class="navbar-brand"
        href="/">
      AutoCost Tracker
    </a>

    <div class="navbar-nav">



      
      
      <a class="nav-link {% if request.path == '/' %}active fw-bold{% endif %}"
         href="/">
        Главная
      </a>

      <a class="nav-link {% if '/cars/' in request.path %}active fw-bold{% endif %}"
         href="/cars/">
        Автомобили</a>      

      <a class="nav-link {% if '/expenses/' in request.path %}active fw-bold{% endif %}"
         href="/expenses/">
        Расходы
      </a>

      <a class="nav-link {% if '/analytics/' in request.path %}active fw-bold{% endif %}"
         href="/analytics/">
        Аналитика
      </a>

      {% if user.is_authenticated %}

      <form method="post"
            action="{% url 'logout' %}"
            class="d-flex align-items-center m-0">

        {% csrf_token %}

        <button
            type="submit"
            class="nav-link btn btn-link p-0 border-0 bg-transparent">

          Выход

        </button>

      </form>

      {% else %}

      <a class="nav-link"
          href="/login/">
        Вход
      </a>

      {% endif %}

    </div>

  </div>
</nav>

<div class="container mt-4">

  {% if messages %}

  {% for message in messages %}

  <div class="alert alert-success alert-dismissible fade show">

    {{ message }}

    <button
        class="btn-close"
        data-bs-dismiss="alert">
    </button>

  </div>

  {% endfor %}

  {% endif %}

  {% block content %}
  {% endblock %}

</div>

<footer class="bg-dark text-white text-center py-3 mt-5">

  AutoCost Tracker © 2026

</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>  
  
</body>
</html>
