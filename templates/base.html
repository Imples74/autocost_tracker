<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AutoCost Tracker{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">
            AutoCost Tracker
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">Главная</a>
                </li>

                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'car_list' %}">Мои автомобили</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'expense_list' %}">Расходы</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'analytics' %}">Аналитика</a>
                    </li>
                {% endif %}

                <li class="nav-item">
                    <a class="nav-link" href="/admin/">Админка</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container">
    {% block content %}
    {% endblock %}
</main>

<footer class="mt-5 py-4 bg-dark text-light">
    <div class="container text-center">
        <small>AutoCost Tracker — учет и анализ расходов на автомобиль</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
