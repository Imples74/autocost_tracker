{% extends 'base.html' %}

{% block content %}

<h2>Удаление автомобиля</h2>

<p>
Вы действительно хотите удалить
{{ car }} ?
</p>

<form method="post">
    {% csrf_token %}

    <button
        type="submit"
        class="btn btn-danger">

        Удалить

    </button>

    <a
        href="/cars/"
        class="btn btn-secondary">

        Отмена

    </a>

</form>

{% endblock %}
