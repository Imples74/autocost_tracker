{% extends 'base.html' %}

{% block content %}

<h2>Удаление расхода</h2>

<p>
Удалить расход
{{ expense.amount }} ?
</p>

<form method="post">

    {% csrf_token %}

    <button
        type="submit"
        class="btn btn-danger">

        Удалить

    </button>

    <a href="/expenses/"
       class="btn btn-secondary">

        Отмена

    </a>

</form>

{% endblock %}
